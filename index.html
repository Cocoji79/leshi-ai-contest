<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <title>AI创新大赛动效页</title>
  <style>
    body {margin:0; font-family:"Segoe UI", Roboto, sans-serif; background:#fff; color:#111; display:flex; align-items:center; justify-content:center; min-height:100vh;}
    .card {text-align:center; padding:40px 32px; border:1px solid #eee; box-shadow:0 10px 30px rgba(0,0,0,.08); border-radius:14px; animation: pop 0.8s ease-out; }
    h1 {margin:0 0 16px; font-size:2rem; color:#084CCF;}
    p {margin:0 0 16px; color:#333;}
    .bar {position:relative; width:240px; height:8px; background:#eee; border-radius:999px; overflow:hidden; margin:20px auto 0;}
    .bar:before {content:''; position:absolute; left:0; height:100%; width:0%; background:linear-gradient(90deg, #007FFF, #00D7FF); animation: load 2.5s infinite; }
    @keyframes load {0%{width:0%}50%{width:100%}100%{width:0%}}
    @keyframes pop {0%{opacity:0; transform:scale(0.95)}100%{opacity:1; transform:scale(1)}}
  </style>
</head>
<body>
  <div class="card">
    <h1>AI创新大赛动效页</h1>
    <p>已自动提交并部署，适配 GitHub Pages。</p>
    <div class="bar"></div>
  </div>
</body>
</html>
